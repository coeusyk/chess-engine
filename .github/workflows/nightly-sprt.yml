name: Nightly SPRT

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC every night
  workflow_dispatch:        # manual trigger

jobs:
  sprt:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CUTECHESS_VERSION: 'v1.4.0'

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build current dev JAR
        run: mvn -B clean package -pl engine-uci -am -DskipTests
        id: build
        shell: pwsh

      - name: Find latest release and download baseline JAR
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          try {
            $latestTag = gh release list --repo $repo --limit 1 --json tagName --jq '.[0].tagName'
          } catch {
            $latestTag = ""
          }

          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            Write-Host "No release tag found — skipping SPRT."
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          Write-Host "Baseline release: $latestTag"
          "tag=$latestTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $baselineDir = Join-Path $env:RUNNER_TEMP "baseline"
          New-Item -ItemType Directory -Path $baselineDir -Force | Out-Null

          gh release download $latestTag `
            --repo $repo `
            --pattern '*.jar' `
            --dir $baselineDir

          $baselineJar = Get-ChildItem -Path $baselineDir -Filter *.jar | Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($baselineJar)) {
            throw "Baseline JAR not found in $baselineDir"
          }

          "jar=$baselineJar" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install cutechess-cli
        if: steps.baseline.outputs.skip != 'true'
        shell: pwsh
        run: |
          # Resolve version from env
          $version = $env:CUTECHESS_VERSION          # e.g. v1.4.0
          $versionNum = $version.TrimStart('v')      # e.g. 1.4.0

          $installDir = Join-Path $env:RUNNER_TEMP 'cutechess'
          $zipPath    = Join-Path $env:RUNNER_TEMP 'cutechess.zip'
          $zipUrl     = "https://github.com/cutechess/cutechess/releases/download/$version/cutechess-$versionNum-win64.zip"

          Write-Host "Downloading cutechess-cli $version from: $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing

          Write-Host "Extracting to: $installDir"
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

          # The CLI binary may be in the root or a subdirectory — find it
          $cliExe = Get-ChildItem -Path $installDir -Recurse -Filter 'cutechess-cli.exe' | Select-Object -First 1 -ExpandProperty FullName
          if (-not $cliExe) {
            throw "cutechess-cli.exe not found after extracting $zipUrl"
          }

          Write-Host "Found cutechess-cli: $cliExe"

          # Add the directory containing the exe to PATH for this job
          $cliDir = Split-Path $cliExe -Parent
          "$cliDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          # Also expose the full path directly for the run step
          "CUTECHESS=$cliExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run SPRT match
        if: steps.baseline.outputs.skip != 'true'
        id: sprt
        shell: pwsh
        run: |
          $devJar = Get-ChildItem -Path engine-uci/target -Filter 'engine-uci-*-shaded.jar' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $devJar) {
            $devJar = Get-ChildItem -Path engine-uci/target -Filter 'engine-uci-*.jar' | Where-Object { $_.Name -notlike 'original-*' } | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $devJar) {
            throw "Dev JAR not found in engine-uci/target"
          }

          $baselineJar = "${{ steps.baseline.outputs.jar }}"
          $cutechess = $env:CUTECHESS
          if (-not $cutechess) {
            $cutechess = (Get-Command cutechess-cli -ErrorAction SilentlyContinue)?.Source
          }
          if (-not $cutechess) {
            throw "cutechess-cli not found."
          }

          Write-Host "Dev JAR:      $devJar"
          Write-Host "Baseline JAR: $baselineJar"
          Write-Host "Cutechess:    $cutechess"

          $sprtOut = Join-Path $env:RUNNER_TEMP 'sprt_output.txt'
          & $cutechess `
            -engine name=Vex-dev  cmd="java -jar $devJar"      proto=uci `
            -engine name=Vex-base cmd="java -jar $baselineJar" proto=uci `
            -each tc=5+0.05 `
            -games 1000 `
            -repeat `
            -recover `
            -resign movecount=5 score=600 `
            -draw movenumber=40 movecount=8 score=10 `
            -sprt elo0=0 elo1=50 alpha=0.05 beta=0.05 `
            -concurrency 2 *>&1 | Tee-Object -FilePath $sprtOut

          $outputText = Get-Content -Path $sprtOut -Raw
          if ($outputText -match 'H1 was accepted') {
            'verdict=H1_ACCEPTED' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } elseif ($outputText -match 'H0 was accepted') {
            'verdict=H0_ACCEPTED' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            'verdict=INCONCLUSIVE' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

          $gamesLine = (Get-Content -Path $sprtOut | Select-String '^Score of' | Select-Object -Last 1).Line
          if (-not $gamesLine) {
            $gamesLine = 'Score line not found in cutechess output.'
          }
          "games_line=$gamesLine" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Post workflow summary
        if: steps.baseline.outputs.skip != 'true'
        shell: pwsh
        run: |
          $verdict = "${{ steps.sprt.outputs.verdict }}"
          $games = "${{ steps.sprt.outputs.games_line }}"
          $tag = "${{ steps.baseline.outputs.tag }}"

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## SPRT Result — $(Get-Date -AsUTC -Format 'yyyy-MM-dd')"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Field | Value |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|-------|-------|"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Baseline | ``$tag`` |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Verdict | **$verdict** |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| TC | 5+0.05 |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| SPRT bounds | elo0=0 elo1=50 alpha=0.05 beta=0.05 |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Score line"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $games
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'

          if ($verdict -eq 'H1_ACCEPTED') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '> H1 accepted - patch improves strength. Safe to merge.'
          } elseif ($verdict -eq 'H0_ACCEPTED') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '> H0 accepted - regression detected. Do NOT merge.'
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '> Inconclusive - game limit reached without SPRT decision.'
          }

      - name: Post skipped summary
        if: steps.baseline.outputs.skip == 'true'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## SPRT Skipped — $(Get-Date -AsUTC -Format 'yyyy-MM-dd')"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No GitHub release tag found. Tag a release to enable nightly SPRT."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "See ``tools/README.md`` for tagging instructions."

      - name: Fail on regression
        if: steps.baseline.outputs.skip != 'true' && steps.sprt.outputs.verdict == 'H0_ACCEPTED'
        shell: pwsh
        run: |
          Write-Error "SPRT H0 accepted — regression confirmed against ${{ steps.baseline.outputs.tag }}. Investigate before merging."
