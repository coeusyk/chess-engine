name: Nightly SPRT

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC every night
  workflow_dispatch:        # manual trigger

jobs:
  sprt:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build current dev JAR
        run: mvn -B clean package -pl engine-uci -am -DskipTests
        id: build

      - name: Find latest release and download baseline JAR
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No release tag found — skipping SPRT."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Baseline release: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/baseline
          gh release download "$LATEST_TAG" \
            --repo ${{ github.repository }} \
            --pattern '*.jar' \
            --dir /tmp/baseline
          BASELINE_JAR=$(ls /tmp/baseline/*.jar | head -1)
          echo "jar=$BASELINE_JAR" >> "$GITHUB_OUTPUT"

      - name: Install cutechess-cli
        if: steps.baseline.outputs.skip != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cutechess

      - name: Run SPRT match
        if: steps.baseline.outputs.skip != 'true'
        id: sprt
        run: |
          DEV_JAR=$(ls engine-uci/target/engine-uci-*-shaded.jar 2>/dev/null || ls engine-uci/target/engine-uci-*.jar | grep -v original | head -1)
          BASELINE_JAR="${{ steps.baseline.outputs.jar }}"
          echo "Dev JAR:      $DEV_JAR"
          echo "Baseline JAR: $BASELINE_JAR"

          cutechess-cli \
            -engine name=Vex-dev  cmd="java -jar \"$DEV_JAR\""      proto=uci \
            -engine name=Vex-base cmd="java -jar \"$BASELINE_JAR\"" proto=uci \
            -each tc=5+0.05 \
            -games 1000 \
            -repeat \
            -recover \
            -resign movecount=5 score=600 \
            -draw movenumber=40 movecount=8 score=10 \
            -sprt elo0=0 elo1=50 alpha=0.05 beta=0.05 \
            -concurrency 2 \
            2>&1 | tee /tmp/sprt_output.txt

          # Extract SPRT verdict
          if grep -q "H1 was accepted" /tmp/sprt_output.txt; then
            echo "verdict=H1_ACCEPTED" >> "$GITHUB_OUTPUT"
          elif grep -q "H0 was accepted" /tmp/sprt_output.txt; then
            echo "verdict=H0_ACCEPTED" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=INCONCLUSIVE" >> "$GITHUB_OUTPUT"
          fi

          # Extract W/D/L and game count
          GAMES_LINE=$(grep -E "^Score of" /tmp/sprt_output.txt | tail -1 || true)
          echo "games_line=$GAMES_LINE" >> "$GITHUB_OUTPUT"

      - name: Post workflow summary
        if: steps.baseline.outputs.skip != 'true'
        run: |
          VERDICT="${{ steps.sprt.outputs.verdict }}"
          GAMES="${{ steps.sprt.outputs.games_line }}"
          TAG="${{ steps.baseline.outputs.tag }}"

          {
            echo "## SPRT Result — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Baseline | \`$TAG\` |"
            echo "| Verdict | **$VERDICT** |"
            echo "| TC | 5+0.05 |"
            echo "| SPRT bounds | elo0=0 elo1=50 α=0.05 β=0.05 |"
            echo ""
            echo "### Score line"
            echo "\`\`\`"
            echo "$GAMES"
            echo "\`\`\`"
            if [ "$VERDICT" = "H1_ACCEPTED" ]; then
              echo "> ✅ H1 accepted — patch improves strength. Safe to merge."
            elif [ "$VERDICT" = "H0_ACCEPTED" ]; then
              echo "> ❌ H0 accepted — regression detected. Do NOT merge."
            else
              echo "> ⚠️ Inconclusive — game limit reached without SPRT decision."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post skipped summary
        if: steps.baseline.outputs.skip == 'true'
        run: |
          {
            echo "## SPRT Skipped — $(date -u +%Y-%m-%d)"
            echo ""
            echo "No GitHub release tag found. Tag a release to enable nightly SPRT."
            echo ""
            echo "See \`tools/README.md\` for tagging instructions."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on regression
        if: steps.baseline.outputs.skip != 'true' && steps.sprt.outputs.verdict == 'H0_ACCEPTED'
        run: |
          echo "::error::SPRT H0 accepted — regression confirmed against ${{ steps.baseline.outputs.tag }}. Investigate before merging."
          exit 1
