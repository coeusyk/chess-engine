name: Backend CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test modules
        run: mvn -B clean test

      - name: Perft harness gate
        run: mvn -B -pl engine-core -Dtest=PerftHarnessTest test
