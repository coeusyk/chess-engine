name: Backend CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test modules
        run: mvn -B clean test

      - name: Run search regression suite
        run: mvn -B -pl engine-core -Dgroups=regression test

      - name: NPS benchmark gate
        run: mvn -B test -pl engine-core -Dgroups=benchmark -Dbenchmark.enabled=true -Dnps.baseline=200000 -Dnps.threshold=0.05
